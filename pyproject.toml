[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "leadclaw"
version = "0.2.0"
description = "Lightweight lead tracking CLI for local service businesses"
requires-python = ">=3.9"
dependencies = [
    "anthropic>=0.25.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
leadclaw = "commands:main"

[tool.setuptools]
py-modules = ["db", "seed", "queries", "drafting", "commands", "scheduler", "config"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
